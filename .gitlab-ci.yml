stages:
  - render
  - deploy

variables:
  DEBIAN_FRONTEND: noninteractive

render:
  stage: render
  image: debian:bookworm-slim
  before_script:
    - apt-get update -y
    - apt-get install -y --no-install-recommends ca-certificates curl make tar gzip
    - rm -rf /var/lib/apt/lists/*
    # Install typst (prebuilt Linux x86_64 release)
    - curl -L -o /tmp/typst.tar.gz "https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-gnu.tar.gz"
    - tar -xzf /tmp/typst.tar.gz -C /usr/local/bin --strip-components=1
    - rm /tmp/typst.tar.gz
    - chmod +x /usr/local/bin/typst || true
  script: |
    # Only run scheduled or push pipelines and stop after 2026-05-31
    if [ "$CI_PIPELINE_SOURCE" != "schedule" ] && [ "$CI_PIPELINE_SOURCE" != "push" ] && [ "$CI_PIPELINE_SOURCE" != "web" ]; then
      echo "Skipping: not a scheduled, push or manual (web) pipeline"
      exit 0
    fi
    RUN_DATE="$(date -u +%Y-%m-%d)"
    if [[ "$RUN_DATE" > "2026-05-31" ]]; then
      echo "Schedule window ended ($RUN_DATE)"
      exit 0
    fi
    make refresh get-fonts typst
  artifacts:
    paths:
      - dkk-programm.pdf
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

# Publish to GitLab Pages: copy the generated PDF into public/ and let the pages job publish it
pages:
  stage: deploy
  image: debian:bookworm-slim
  needs: [render]
  dependencies:
    - render
  script:
    - mkdir -p public
    - if [ -f dkk-programm.pdf ]; then cp dkk-programm.pdf public/; fi
    - echo "PDF prepared as page"
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never
